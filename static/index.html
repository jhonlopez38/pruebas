<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hermes GPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:#07111f;
  color:#e5e7eb;
  font-family:Arial;
}

.header{
  background:#081827;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  border-bottom:1px solid #1e3a5f;
}

.container{
  display:grid;
  grid-template-columns:250px 1fr 300px;
  gap:10px;
  padding:10px;
}

.card{
  background:#081827;
  border:1px solid #1e3a5f;
  border-radius:8px;
  padding:10px;
}

.card h3{
  margin:0 0 10px;
  color:#38bdf8;
}

#map{
  height:600px;
  border-radius:8px;
}

button{
  width:100%;
  margin:5px 0;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#0b3b70;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.console{
  background:black;
  color:#22c55e;
  font-family:monospace;
  height:150px;
  overflow:auto;
  padding:10px;
  border-radius:6px;
}

</style>
</head>

<body>

<div class="header">
HERMES GPS
</div>

<div class="container">

<!-- IZQUIERDA -->
<div>

  <div class="card">
    <h3>ESTADO</h3>
    <div>Unidad: HERMES-01</div>
    <div>Estado: <b style="color:#22c55e;">ACTIVO</b></div>
  </div>

  <div class="card">
    <h3>POSICIÓN</h3>
    <div>Lat: <span id="lat">--</span></div>
    <div>Lon: <span id="lon">--</span></div>
    <div>Hora: <span id="hora">--</span></div>
  </div>

</div>

<!-- MAPA -->
<div>
  <div id="map"></div>
</div>

<!-- DERECHA -->
<div>

  <div class="card">
    <h3>COMANDOS</h3>

    <button onclick="actualizar()">Actualizar</button>
    <button onclick="verKML()">Ver KML</button>
    <button onclick="verCSV()">Ver CSV</button>
    <button onclick="status()">Status</button>

  </div>

  <div class="card">
    <h3>CONSOLA</h3>
    <div class="console" id="console"></div>
  </div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const BASE = "https://gps-backend-pqzg.onrender.com";

let map = L.map('map').setView([4.82, -74.34], 13);
let marker = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

function log(msg){
  let c = document.getElementById("console");
  c.innerHTML += msg + "<br>";
  c.scrollTop = c.scrollHeight;
}

function actualizar(){

  fetch(BASE + "/files/gps_log.csv?t=" + Date.now())
  .then(r => r.text())
  .then(data => {

    let lineas = data.trim().split("\n");

    if(lineas.length < 2){
      log("Sin datos");
      return;
    }

    let ultima = lineas[lineas.length-1].split(",");

    let lat = parseFloat(ultima[4]);
    let lon = parseFloat(ultima[5]);
    let hora = ultima[3];

    if(isNaN(lat) || isNaN(lon)){
      log("Coordenadas inválidas");
      return;
    }

    if(marker){
      marker.setLatLng([lat, lon]);
    }else{
      marker = L.marker([lat, lon]).addTo(map);
    }

    marker.bindPopup("Lat: " + lat + "<br>Lon: " + lon).openPopup();

    map.setView([lat, lon], 16);

    document.getElementById("lat").innerText = lat;
    document.getElementById("lon").innerText = lon;
    document.getElementById("hora").innerText = hora;

    log("Actualizado: " + lat + "," + lon);

  })
  .catch(() => log("Error leyendo CSV"));

}

function verKML(){
  window.open(BASE + "/files/ruta.kml");
}

function verCSV(){
  window.open(BASE + "/files/gps_log.csv");
}

function status(){
  fetch(BASE + "/health")
  .then(r => r.json())
  .then(d => alert(JSON.stringify(d, null, 2)));
}

actualizar();
setInterval(actualizar, 30000);

</script>

</body>
</html>
